              text: Faint sirens grow distant as they fade
            - roll: { min: 95, max: 96 }
              text: Wandering shadows elongate under dim streetlights
            - roll: { min: 97, max: 98 }
              text: Broken-down cars rust in desolate parking lots
            - roll: { min: 99, max: 100 }
