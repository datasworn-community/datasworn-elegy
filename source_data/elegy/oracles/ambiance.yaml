              text: Dilapidated buildings creak with unseen movement
            - roll: { min: 43, max: 44 }
              text: Low rumbling of passing subway trains
            - roll: { min: 45, max: 46 }
              text: Stray cats dart between crumbling structures
            - roll: { min: 47, max: 48 }
              text: Distant hum of electrical transformers fills the air
