_id: elegy
datasworn_version: "0.1.0"
type: ruleset
oracles:
  ambiance:
    name: Ambiance Oracles
    type: oracle_collection
    oracle_type: tables
    _source:
      <<: &Source
          title: 'Elegy 3.5'
          license: https://creativecommons.org/licenses/by-nc-sa/4.0
          url: https://miraclem.itch.io/elegy
          date: 2024-07-31
          authors:
            - name: moro de oliveira
    contents:
      streets:
          name: Streets
          type: oracle_rollable
          oracle_type: table_text
          canonical_name: 'Street ambiances Table'
          summary: Use this oracle to determine ambiance in the street theme.
          dice: 1d100
          _source:
            <<: *Source
          rows:
            - roll: { min: 1, max: 2 }
              text: Distant sirens wail through the night
            - roll: { min: 3, max: 4 }
              text: Flickering streetlights create shifting shadows
            - roll: { min: 5, max: 6 }
              text: Rain-soaked streets reflect dim lamplights
            - roll: { min: 7, max: 8 }
              text: Lurking figures linger in concealed corners
            - roll: { min: 9, max: 10 }
              text: Empty alleyways echo with whispered secrets
            - roll: { min: 11, max: 12 }
              text: Gritty graffiti adorns decaying brick walls
            - roll: { min: 13, max: 14 }
              text: Thick fog slithers through narrow passages
            - roll: { min: 15, max: 16 }
              text: Damp air carries a bone-chilling coldness
            - roll: { min: 17, max: 18 }
              text: Pounding footsteps reverberate in empty alleys
            - roll: { min: 19, max: 20 }
              text: Abandoned cars sit motionless along the road
            - roll: { min: 21, max: 22 }
              text: Hushed conversations drift from hidden doorways
            - roll: { min: 23, max: 24 }
              text: Broken glass crunches under weary footsteps
