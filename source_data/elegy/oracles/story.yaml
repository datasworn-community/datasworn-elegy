_id: elegy
datasworn_version: "0.1.0"
type: ruleset
oracles:
  story:
    name: Story Oracles
    type: oracle_collection
    oracle_type: tables
    _source:
      <<: &Source
          title: 'Elegy 3.5'
          license: https://creativecommons.org/licenses/by-nc-sa/4.0
          url: https://miraclem.itch.io/elegy
          date: 2024-07-31
          authors:
            - name: moro de oliveira
    contents:
      clues:
          name: Clues
          type: oracle_rollable
          oracle_type: table_text
          canonical_name: 'Clues Table'
          summary: Use this oracle to determine story clues.
          dice: 1d100
          _source:
            <<: *Source
          rows:
            - roll: { min: 1, max: 2 }
              text: Affirms a previously understood fact or clue
            - roll: { min: 3, max: 4 }
              text: Connects to a known rumor or scandal
            - roll: { min: 5, max: 6 }
              text: Connects to a previously unrelated mystery or mission
            - roll: { min: 7, max: 8 }
              text: Connects to your own expertise or interests
            - roll: { min: 9, max: 10 }
              text: Contradicts a previously understood fact or clue
            - roll: { min: 11, max: 12 }
              text: Evokes a personal memory
            - roll: { min: 13, max: 14 }
              text: Evokes a remarkable supernatural phenomenon
            - roll: { min: 15, max: 16 }
              text: Evokes a vision or prophecy
            - roll: { min: 17, max: 18 }
              text: Involves a cultural touchstone
            - roll: { min: 19, max: 20 }
              text: Involves a hidden or mysterious faction
            - roll: { min: 21, max: 22 }
              text: Involves a hidden or mysterious vampire
            - roll: { min: 23, max: 24 }
              text: Involves a key or means of access
            - roll: { min: 25, max: 26 }
              text: Involves a hidden or mysterious mortal
            - roll: { min: 27, max: 28 }
              text: Involves a supernatural being
            - roll: { min: 29, max: 30 }
              text: Involves a notable faction
            - roll: { min: 31, max: 32 }
              text: Involves a notable vampire
            - roll: { min: 33, max: 34 }
              text: Involves a person or faction from your background
            - roll: { min: 35, max: 36 }
              text: Involves a personal item
            - roll: { min: 37, max: 38 }
              text: Involves an enemy or rival
            - roll: { min: 39, max: 40 }
              text: Involves a notable mortal
            - roll: { min: 41, max: 42 }
              text: Involves an unusual ability or power
            - roll: { min: 43, max: 44 }
              text: Involves someone you trust
            - roll: { min: 45, max: 46 }
              text: Involves something rare, expensive, or precious
            - roll: { min: 47, max: 48 }
              text: Leads to a strange or unfamiliar place
            - roll: { min: 49, max: 50 }
              text: Leads to a hidden or forgotten place
            - roll: { min: 51, max: 52 }
              text: Leads to a nearby or familiar place
