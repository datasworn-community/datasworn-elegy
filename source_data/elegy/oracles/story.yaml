              text: Werewolves overrun vampire territory
            - roll: { min: 37, max: 38 }
              text: Betrayal by spy jeopardizes faction
            - roll: { min: 39, max: 40 }
              text: Factions clash over limited feeding grounds
            - roll: { min: 41, max: 42 }
              text: Faction leader plots assassination against rivals
            - roll: { min: 43, max: 44 }
              text: A vampire hunter organization infiltrates the city
