      complications:
          name: Complications
          type: oracle_rollable
          oracle_type: table_text
          canonical_name: 'Complication Table'
          summary: Use this oracle to determine story complications.
          dice: 1d100
          _source:
            <<: *Source
          rows:
            - roll: { min: 1, max: 3 }
              text: Supernatural power fails
            - roll: { min: 4, max: 6 }
              text: Supernatural power misfires
            - roll: { min: 7, max: 9 }
              text: Debt or promise comes due
            - roll: { min: 10, max: 12 }
              text: Enemy reveals unexpected powers, abilities, or influence
            - roll: { min: 13, max: 15 }
              text: Enemy reveals their true agenda or nature
            - roll: { min: 16, max: 18 }
              text: Enemy unexpectedly benefits from your actions
            - roll: { min: 19, max: 21 }
              text: Key location is made inaccessible
            - roll: { min: 22, max: 24 }
              text: Key location is threatened or made unsafe
            - roll: { min: 25, max: 27 }
              text: A mortal notices you're not human
            - roll: { min: 28, max: 30 }
              text: You lose control and feed on the closest mortal
            - roll: { min: 31, max: 33 }
              text: Objective of a quest is not what you assumed
            - roll: { min: 34, max: 36 }
              text: Old enemy resurfaces
            - roll: { min: 37, max: 39 }
              text: Simultaneous problems force a hard choice
            - roll: { min: 40, max: 42 }
              text: Someone important betrays your trust
            - roll: { min: 43, max: 45 }
              text: Someone important is threatened or endangered
            - roll: { min: 46, max: 48 }
              text: Someone important reveals their problematic secret or history
            - roll: { min: 49, max: 51 }
              text: Something important goes missing
            - roll: { min: 52, max: 54 }
              text: A supernatural power is shown to have unexpected consequences
            - roll: { min: 55, max: 57 }
              text: Time pressure suddenly increases
            - roll: { min: 58, max: 60 }
              text: Trap is sprung
            - roll: { min: 61, max: 63 }
              text: True agenda of a connection is revealed
            - roll: { min: 64, max: 66 }
              text: Trusted information is shown to be false
            - roll: { min: 67, max: 69 }
              text: Two seemingly unrelated problems are shown to be connected
            - roll: { min: 70, max: 72 }
              text: Undermined by self-doubt or vulnerabilities
            - roll: { min: 73, max: 75 }
              text: Unexpected enemies appear
            - roll: { min: 76, max: 78 }
              text: Urgent message distracts you from your mission
            - roll: { min: 79, max: 81 }
              text: You are tracked or followed
            - roll: { min: 82, max: 84 }
              text: You were diverted from the true crisis
            - roll: { min: 85, max: 87 }
              text: An unexpected ally appears
            - roll: { min: 88, max: 90 }
              text: A hidden treasure or artifact is discovered
            - roll: { min: 91, max: 93 }
              text: A long-lost relative or friend resurfaces
            - roll: { min: 94, max: 96 }
              text: A powerful artifact or weapon is revealed
            - roll: { min: 97, max: 100 }
              text: Roll twice
      city_events:
