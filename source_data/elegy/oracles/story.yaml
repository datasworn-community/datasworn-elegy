              text: A vampire’s progeny rebels, gathering their own faction
            - roll: { min: 53, max: 54 }
              text: A faction leader is framed for a heinous crime
            - roll: { min: 55, max: 56 }
              text: A rival faction joins forces with werewolf adversaries
            - roll: { min: 57, max: 58 }
              text: A vampire hunter reveals the existence of vampire society
            - roll: { min: 59, max: 60 }
              text: A rogue vampire initiates a citywide reign of terror
            - roll: { min: 61, max: 62 }
              text: A vampire’s mortal ally is possessed by an ancient spirit
            - roll: { min: 63, max: 64 }
              text: A vampire conspiracy seeks to control mortal governments
            - roll: { min: 65, max: 66 }
              text: A vampire’s mortal family is targeted by a vengeful adversary
            - roll: { min: 67, max: 68 }
              text: A faction leader betrays their allies, forging new alliances
            - roll: { min: 69, max: 70 }
              text: A vampire is wrongly accused of breaking the sacred traditions
            - roll: { min: 71, max: 72 }
              text: A supernatural entity demands the sacrifice of an innocent mortal
